name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.*"
          cache: true

      - name: Build Tests
        working-directory: tests
        run: qmake && make

      - name: Run Tests
        working-directory: tests
        run: ./tests
